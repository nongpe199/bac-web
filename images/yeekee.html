function calc(){
// 🔥 ล้างผลเก่าทันที
document.getElementById("formulaResult").style.display = "none";
document.getElementById("formulaResult").innerHTML = "";

    let web = document.getElementById("webSelect").value;

    // 🔥 ต้องอยู่บนสุด
    if(web === ""){
        alert("กรุณาเลือกเว็บก่อน");
        return;
    }

    let top = document.getElementById("top").value;
    let bottom = document.getElementById("bottom").value;

    if(top.length !== 3 || bottom.length !== 2){
        alert("กรุณากรอกเลขให้ครบ");
        return;
    }

    let topNum = parseInt(top);
let bottomNum = parseInt(bottom);

// 🔥 กรณีพิเศษ
if (bottomNum === 0) {
    main = 1;
    sub = 0;

    document.getElementById("guideText").style.display = "block";
    document.getElementById("extraBtns").style.display = "flex";

    // ✅ ใส่ตรงนี้ (ถูกที่)
    let btns = document.querySelectorAll("#extraBtns button");
    selectBtn(btns[0]);

    return;
}
// 🔥 แยกสูตรตามเว็บ

if(web === "cjw"){
    let remainder = topNum % bottomNum;
    let digits = "";

    for(let i=0; i<10; i++){
        remainder *= 10;
        let digit = Math.floor(remainder / bottomNum);
        digits += digit;
        remainder = remainder % bottomNum;
    }

    main = parseInt(digits.charAt(digits.length - 1));

    sub = main - 1;
    if (sub < 0) sub = 9;
}

else if(web === "cj"){
    let merged = parseInt(top + bottom);
    let result = merged / 219;

    let decimal = result.toString().split(".")[1];

    main = parseInt(decimal.charAt(0));

    sub = main + 1;
    if(sub > 9) sub = 0;
}

else if(web === "dna"){

    let merged = parseInt(top.toString() + bottom.toString());
    let result = merged / 131;

    let decimal = result.toString().includes(".")
    ? result.toString().split(".")[1]
    : "00";

    let d = parseInt(decimal.charAt(0)) || 0;

    // 🔥 ฟัน
    let fan = d + 1;
    if(fan > 9) fan -= 10;

    // 🔥 รอง
    let rong = fan + 1;
    if(rong > 9) rong -= 10;

    main = fan;
    sub = rong;
}
else if(web === "h"){

    let merged = parseInt(top.toString() + bottom.toString());
    let result = merged / 131;

        ? result.toString().split(".")[1]
        : "00";

    let d = parseInt(decimal.charAt(0)) || 0;

    let fan = d + 1;
    if(fan > 9) fan -= 10;

    let rong = fan + 1;
    if(rong > 9) rong -= 10;

    main = fan;
    sub = rong;
}
